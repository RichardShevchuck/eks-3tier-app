name: Build and Deploy EKS Cluster

on:
  push:
    branches:
      - main
      - test/cicd-pipeline

env:
  AWS_REGION: eu-central-1
  CLUSTER_NAME: eks-3tier-app

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ./backend/requirements.txt

      - name: Run tests
        run: python -m pytest ./backend/tests/ -v || echo "No tests found, skipping"

  build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-build
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build docker images
        run: |
          docker build -t frontend:latest -f ./frontend/Dockerfile ./frontend
          docker build -t backend:latest -f ./backend/Dockerfile ./backend
          docker tag frontend:latest ${{ secrets.ECR_FRONTEND }}:${{ github.sha }}
          docker tag frontend:latest ${{ secrets.ECR_FRONTEND }}:latest
          docker tag backend:latest ${{ secrets.ECR_BACKEND }}:${{ github.sha }}
          docker tag backend:latest ${{ secrets.ECR_BACKEND }}:latest

      - name: Push Docker images to Amazon ECR
        run: |
          docker push ${{ secrets.ECR_FRONTEND }}:${{ github.sha }}
          docker push ${{ secrets.ECR_FRONTEND }}:latest
          docker push ${{ secrets.ECR_BACKEND }}:${{ github.sha }}
          docker push ${{ secrets.ECR_BACKEND }}:latest

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Change image tags in deployment.yaml
        run: |
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8s/backend/deployment.yaml
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8s/frontend/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/ --recursive
